[env:esp32-s3-touch-lcd-4b]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

monitor_speed = 115200
; PlatformIO auto-detects the serial port. If it picks the wrong one (or
; you have multiple boards attached), override on the command line instead
; of editing this file, e.g.:
;   pio run -t upload --upload-port COM3
;   pio run -t upload --upload-port /dev/ttyUSB0
;   pio device monitor --port /dev/cu.usbserial-1420

extra_scripts = pre:scripts/strip_lvgl_arm_asm.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude

lib_deps =
    lvgl/lvgl@9.2.2
    bblanchon/ArduinoJson@^7.2.0
    moononournation/GFX Library for Arduino@1.4.9
    lewisxhe/SensorLib@^0.4.0
    knolleary/PubSubClient@^2.8
